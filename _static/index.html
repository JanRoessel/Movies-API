<html>
<head>
    <meta charset="UTF-8">
    <title>My Movie App</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="list-movies-title">
    <h1>My Movie App</h1>
</div>
<div>
    <ol class="movie-grid">
        
        <li>
            <div class="movie">
                <img class="movie-poster" src="https://m.media-amazon.com/images/M/MV5BYzZmZWViM2EtNzhlMi00NzBlLWE0MWEtZDFjMjk3YjIyNTBhXkEyXkFqcGc@._V1_SX300.jpg" alt="Batman">
                <div class="movie-title">Batman</div>
                <div class="movie-year">1989</div>
                <div class="movie-year">⭐ 7.5</div>
            </div>
        </li>
        
        <li>
            <div class="movie">
                <img class="movie-poster" src="" alt="Spiderman">
                <div class="movie-title">Spiderman</div>
                <div class="movie-year">1990</div>
                <div class="movie-year">⭐ 5.6</div>
            </div>
        </li>
        
        <li>
            <div class="movie">
                <img class="movie-poster" src="https://m.media-amazon.com/images/M/MV5BYTJhODI1YjMtYjc0Ni00YTcyLTgxNjYtMzYzNDllZWI1ZTI0XkEyXkFqcGc@._V1_SX300.jpg" alt="The Hobbit">
                <div class="movie-title">The Hobbit</div>
                <div class="movie-year">1977</div>
                <div class="movie-year">⭐ 6.7</div>
            </div>
        </li>
        
    </ol>
</div>
</body>
</html>
